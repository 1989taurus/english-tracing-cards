<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
<style>
  @page {
    size: A4;
    margin: 12mm 14mm;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Comic Sans MS", "Chalkboard SE", "Kristen ITC", "Patrick Hand", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #222;
    background: #f6f1e7;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    width: 210mm;
    min-height: 297mm;
    padding: 12mm 14mm;
    background: #fffdf6;
    page-break-after: always;
    position: relative;
  }
  .page:last-child { page-break-after: auto; }
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 4mm;
    margin-bottom: 6mm;
    border-bottom: 2px dashed #e0a96d;
  }
  .page-header .title {
    font-size: 18pt;
    color: #b8641c;
    font-weight: bold;
  }
  .page-header .meta {
    font-size: 10pt;
    color: #a67950;
  }
  .card {
    display: flex;
    gap: 6mm;
    margin-bottom: 6mm;
    padding: 4mm;
    border: 2px dashed #f0c090;
    border-radius: 6mm;
    background: #fff;
    break-inside: avoid;
  }
  .card-info {
    flex: 0 0 42mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2mm;
    border-right: 2px dashed #f0c090;
  }
  .card-info .emoji {
    font-size: 42pt;
    line-height: 1;
    margin-bottom: 2mm;
  }
  .card-info .word-label {
    font-size: 14pt;
    font-weight: bold;
    color: #2d6a9f;
  }
  .card-info .phonetic {
    font-size: 10pt;
    color: #666;
    font-family: "Lucida Sans Unicode", "DejaVu Sans", "Arial Unicode MS", sans-serif;
    margin-top: 1mm;
  }
  .card-info .meaning {
    font-size: 11pt;
    color: #333;
    margin-top: 1mm;
  }
  .card-rows {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 2mm;
  }
  .row {
    width: 100%;
    height: 13mm;
  }
  .row svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }
  .footer-tip {
    text-align: center;
    font-size: 9pt;
    color: #a67950;
    margin-top: 4mm;
  }
  @media screen {
    body { padding: 20px; }
    .page { margin: 0 auto 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  }
  @media print {
    body { background: #fff; }
    .page { box-shadow: none; margin: 0; }
  }
</style>
</head>
<body>
{{PAGES}}
</body>
</html>
