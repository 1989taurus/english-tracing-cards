<!-- ============================================================ -->
<!-- SNIPPET: PAGE_WRAPPER                                        -->
<!-- One per A4 page. Place cards inside.                         -->
<!-- Variables: {{PAGE_NUM}} {{PAGE_TOTAL}} {{THEME}} {{CARDS}}   -->
<!-- ============================================================ -->
<section class="page">
  <header class="page-header">
    <span class="title">English Tracing · 英语描红卡 · {{THEME}}</span>
    <span class="meta">Page {{PAGE_NUM}} / {{PAGE_TOTAL}}</span>
  </header>
  <div class="cards-area">
    {{CARDS}}
  </div>
  <p class="footer-tip">先看、再描、最后自己写一遍 · Look → Trace → Write</p>
</section>

<!-- ============================================================ -->
<!-- SNIPPET: CARD                                                -->
<!-- One per word. 4 rows: 2 dashed trace + 2 blank practice.     -->
<!-- Variables: {{EMOJI}} {{WORD}} {{PHONETIC}} {{MEANING}}       -->
<!-- ============================================================ -->
<div class="card">
  <div class="card-info">
    <div class="emoji">{{EMOJI}}</div>
    <div class="word-label">{{WORD}}</div>
    <div class="phonetic">{{PHONETIC}}</div>
    <div class="meaning">{{MEANING}}</div>
  </div>
  <div class="card-rows">
    <div class="row">{{ROW_TRACE}}</div>
    <div class="row">{{ROW_TRACE}}</div>
    <div class="row">{{ROW_BLANK}}</div>
    <div class="row">{{ROW_BLANK}}</div>
  </div>
</div>

<!-- ============================================================ -->
<!-- SNIPPET: ROW_TRACE                                           -->
<!-- 双 SVG 架构:                                                 -->
<!--   · row-grid   四线格铺满全宽 (preserveAspectRatio=none)     -->
<!--   · row-letters 字母保持原比例 (xMinYMid meet, viewBox 1250) -->
<!-- DOM 顺序：网格在前、字母在后，字母覆盖网格。                   -->
<!-- Variable: {{LETTER_GROUPS}} 1 份纯黑首份 + N 份浅蓝副本      -->
<!-- ============================================================ -->
<svg class="row-grid" viewBox="0 0 1000 120" preserveAspectRatio="none">
  <line x1="0" y1="0"   x2="1000" y2="0"   stroke="#e8505b" stroke-width="1.4" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="40"  x2="1000" y2="40"  stroke="#f5a0a6" stroke-width="1" stroke-dasharray="5,4" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="80"  x2="1000" y2="80"  stroke="#f5a0a6" stroke-width="1" stroke-dasharray="5,4" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="120" x2="1000" y2="120" stroke="#e8505b" stroke-width="1.4" vector-effect="non-scaling-stroke"/>
</svg>
<svg class="row-letters" viewBox="0 0 1250 120" preserveAspectRatio="xMinYMid meet">
  {{LETTER_GROUPS}}
</svg>

<!-- ============================================================ -->
<!-- SNIPPET: ROW_BLANK                                           -->
<!-- 只有网格，没有字母。结构与 ROW_TRACE 的网格层一致。          -->
<!-- ============================================================ -->
<svg class="row-grid" viewBox="0 0 1000 120" preserveAspectRatio="none">
  <line x1="0" y1="0"   x2="1000" y2="0"   stroke="#e8505b" stroke-width="1.4" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="40"  x2="1000" y2="40"  stroke="#f5a0a6" stroke-width="1" stroke-dasharray="5,4" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="80"  x2="1000" y2="80"  stroke="#f5a0a6" stroke-width="1" stroke-dasharray="5,4" vector-effect="non-scaling-stroke"/>
  <line x1="0" y1="120" x2="1000" y2="120" stroke="#e8505b" stroke-width="1.4" vector-effect="non-scaling-stroke"/>
</svg>
