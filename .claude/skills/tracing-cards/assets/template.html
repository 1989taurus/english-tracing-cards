<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
<style>
  @page {
    size: A4;
    margin: 0;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Comic Sans MS", "Chalkboard SE", "Kristen ITC", "Patrick Hand", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #222;
    background: #f6f1e7;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    width: 210mm;
    height: 297mm;
    padding: 10mm 12mm;
    background: #fffdf6;
    page-break-after: always;
    page-break-inside: avoid;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .page:last-child { page-break-after: auto; }
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 3mm;
    margin-bottom: 4mm;
    border-bottom: 2px dashed #e0a96d;
    flex: 0 0 auto;
  }
  .page-header .title {
    font-size: 16pt;
    color: #b8641c;
    font-weight: bold;
  }
  .page-header .meta {
    font-size: 10pt;
    color: #a67950;
  }
  .cards-area {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 4mm;
    min-height: 0;
  }
  .card {
    display: flex;
    gap: 5mm;
    padding: 3mm;
    border: 2px dashed #f0c090;
    border-radius: 5mm;
    background: #fff;
    break-inside: avoid;
    page-break-inside: avoid;
    flex: 1 1 0;
    min-height: 0;
  }
  .card-info {
    flex: 0 0 40mm;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2mm;
    border-right: 2px dashed #f0c090;
  }
  .card-info .emoji {
    font-size: 34pt;
    line-height: 1;
    margin-bottom: 1.5mm;
  }
  .card-info .word-label {
    font-size: 13pt;
    font-weight: bold;
    color: #2d6a9f;
  }
  .card-info .phonetic {
    font-size: 9.5pt;
    color: #666;
    font-family: "Lucida Sans Unicode", "DejaVu Sans", "Arial Unicode MS", sans-serif;
    margin-top: 1mm;
  }
  .card-info .meaning {
    font-size: 10.5pt;
    color: #333;
    margin-top: 1mm;
  }
  .card-rows {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 1.5mm;
    min-width: 0;
  }
  .row {
    width: 100%;
    flex: 1 1 0;
    min-height: 0;
  }
  .row svg {
    width: 100%;
    height: 100%;
    display: block;
    overflow: visible;
  }
  .footer-tip {
    text-align: center;
    font-size: 9pt;
    color: #a67950;
    margin-top: 3mm;
    flex: 0 0 auto;
  }
  @media screen {
    body { padding: 20px; }
    .page { margin: 0 auto 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  }
  @media print {
    html, body { width: 210mm; margin: 0; padding: 0; background: #fff; }
    body { background: #fff; }
    .page { box-shadow: none; margin: 0; }
  }
</style>
